<!DOCTYPE html>
<html lang="pt-BBR">
<head>
  <!-- FuuPayment Panel — Painel de gestao de pagamentos standalone -->
  <!-- Funcionalidades: Login, Dashboard, Tabela de pagamentos, Modal de detalhes -->
  <!-- Conecta ao Payment Service via REST API (fuudelivery-payment.onrender.com) -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuuPayment Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; }
    
    .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: #1a1a2e; padding: 40px; border-radius: 12px; width: 400px; }
    .login-box h1 { color: #00ff88; margin-bottom: 20px; text-align: center; }
    .login-box input { width: 100%; padding: 12px; margin: 8px 0; background: #16213e; border: 1px solid #333; border-radius: 6px; color: #fff; }
    .login-box button { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    .app { display: none; }
    .header { background: #1a1a2e; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
    .header h1 { color: #00ff88; font-size: 20px; }
    .header button { background: #ff4444; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    
    .tabs { display: flex; background: #16213e; border-bottom: 1px solid #333; }
    .tab { padding: 12px 24px; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { border-bottom-color: #00ff88; color: #00ff88; }
    
    .content { padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #1a1a2e; padding: 20px; border-radius: 8px; }
    .stat-card h3 { color: #888; font-size: 14px; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: bold; }
    .stat-card .value.green { color: #00ff88; }
    .stat-card .value.red { color: #ff4444; }
    .stat-card .value.yellow { color: #ffaa00; }
    
    .table-container { background: #1a1a2e; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #16213e; padding: 12px; text-align: left; font-size: 14px; color: #888; }
    td { padding: 12px; border-bottom: 1px solid #333; }
    tr:hover { background: #16213e; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .badge.pending { background: #ffaa0033; color: #ffaa00; }
    .badge.approved { background: #00ff8833; color: #00ff88; }
    .badge.rejected { background: #ff444433; color: #ff4444; }
    .badge.high { background: #ff444433; color: #ff4444; }
    .badge.critical { background: #ff000033; color: #ff0000; }
    
    .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; }
    .btn-approve { background: #00ff88; color: #000; }
    .btn-reject { background: #ff4444; color: #fff; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
    .modal-content { background: #1a1a2e; padding: 24px; border-radius: 12px; width: 500px; }
    .modal-content h2 { margin-bottom: 16px; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; background: #16213e; border: 1px solid #333; border-radius: 6px; color: #fff; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>FuuPayment</h1>
      <input type="email" id="email" placeholder="Email" value="admin@email.com">
      <input type="password" id="password" placeholder="Password" value="123456">
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <div class="app" id="app">
    <div class="header">
      <h1>FuuPayment Panel</h1>
      <button onclick="logout()">Sair</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('payments')">Pagamentos</div>
      <div class="tab" onclick="showTab('chargebacks')">Chargebacks</div>
      <div class="tab" onclick="showTab('wallets')">Carteiras</div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <div class="modal" id="rejectModal">
    <div class="modal-content">
      <h2>Rejeitar Pagamento</h2>
      <textarea id="rejectReason" placeholder="Motivo da rejeição" rows="4"></textarea>
      <div class="modal-actions">
        <button class="btn btn-reject" onclick="confirmReject()">Confirmar</button>
        <button class="btn" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    // =====================================================
    // FuuPayment Panel — Cliente JavaScript
    // =====================================================

    // URL base do Payment Service (detecta automaticamente localhost vs producao)
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:8084' : 'https://fuudelivery-payment.onrender.com';
    let token = '';       // Token JWT para autenticacao
    let currentTab = 'payments';  // Aba ativa
    let pendingRejectId = null;   // ID do pagamento pendente de rejeicao

    /**
     * login() — Autentica o usuario via API.
     * Envia email/senha para POST /api/auth/login.
     * Se sucesso, esconde tela de login e carrega aba de pagamentos.
     */
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const resp = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();
        if (data.token) {
          token = data.token;
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          loadTab('payments');
        }
      } catch (err) {
        alert('Erro ao fazer login');
      }
    }

    /** logout() — Limpa token e volta para tela de login */
    function logout() {
      token = '';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }

    /** showTab() — Troca a aba ativa e recarrega o conteudo */
    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadTab(tab);
    }

    /**
     * loadTab() — Carrega o conteudo da aba selecionada.
     * Para 'payments': busca stats + lista de pagamentos e renderiza tabela.
     * Para 'chargebacks' e 'wallets': placeholder (em breve).
     */
    async function loadTab(tab) {
      const content = document.getElementById('content');
      
      if (tab === 'payments') {
        const statsResp = await fetch(`${API_URL}/api/payments/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
        const stats = await statsResp.json();
        
        content.innerHTML = `
          <div class="stats">
            <div class="stat-card"><h3>Total</h3><div class="value">${stats.total || 0}</div></div>
            <div class="stat-card"><h3>Pendentes</h3><div class="value yellow">${stats.pending || 0}</div></div>
            <div class="stat-card"><h3>Aprovados</h3><div class="value green">${stats.approved || 0}</div></div>
            <div class="stat-card"><h3>Rejeitados</h3><div class="value red">${stats.rejected || 0}</div></div>
            <div class="stat-card"><h3>Alto Risco</h3><div class="value red">${stats.high_risk || 0}</div></div>
          </div>
          <div class="table-container">
            <table>
              <thead><tr><th>Pedido</th><th>Cliente</th><th>Valor</th><th>Risco</th><th>Status</th><th>Ações</th></tr></thead>
              <tbody id="paymentsTable"></tbody>
            </table>
          </div>
        `;
        
        const listResp = await fetch(`${API_URL}/api/payments/?limit=50`, { headers: { 'Authorization': `Bearer ${token}` } });
        const listData = await listResp.json();
        const tbody = document.getElementById('paymentsTable');
        
        (listData.payments || []).forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.order_id}</td>
            <td>${p.customer_name || p.customer_id}</td>
            <td>R$ ${p.amount.toFixed(2)}</td>
            <td><span class="badge ${p.risk_level}">${p.risk_level}</span></td>
            <td><span class="badge ${p.status}">${p.status}</span></td>
            <td>
              ${p.status === 'pending' ? `
                <button class="btn btn-approve" onclick="approvePayment('${p.id}')">Aprovar</button>
                <button class="btn btn-reject" onclick="showRejectModal('${p.id}')">Rejeitar</button>
              ` : '-'}
            </td>
          `;
          tbody.appendChild(tr);
        });
      } else if (tab === 'chargebacks') {
        content.innerHTML = '<p>Chargebacks em breve...</p>';
      } else if (tab === 'wallets') {
        content.innerHTML = '<p>Carteiras em breve...</p>';
      }
    }

    /** approvePayment() — Aprova um pagamento via POST /api/payments/:id/approve */
    async function approvePayment(id) {
      await fetch(`${API_URL}/api/payments/${id}/approve`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadTab(currentTab);
    }

    /** showRejectModal() — Abre modal para informar motivo da rejeicao */
    function showRejectModal(id) {
      pendingRejectId = id;
      document.getElementById('rejectModal').style.display = 'flex';
    }

    /** closeModal() — Fecha modal de rejeicao e limpa estado */
    function closeModal() {
      document.getElementById('rejectModal').style.display = 'none';
      pendingRejectId = null;
    }

    /** confirmReject() — Envia rejeicao com motivo via POST /api/payments/:id/reject */
    async function confirmReject() {
      if (!pendingRejectId) return;
      const reason = document.getElementById('rejectReason').value;
      await fetch(`${API_URL}/api/payments/${pendingRejectId}/reject`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason })
      });
      closeModal();
      loadTab(currentTab);
    }
  </script>
</body>
</html>
