name: CI Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Build & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/fuudelivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/fuudelivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Check formatting
        run: |
          gofmt -l -s . | tee /dev/stderr
          if [ -n "$(gofmt -l -s .)" ]; then exit 1; fi
