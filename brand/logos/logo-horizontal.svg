<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bag/Moto icon -->
  <g transform="translate(40, 40)">
    <!-- Back wheel -->
    <circle cx="95" cy="85" r="22" fill="#DC2626" opacity="0.15"/>
    <!-- Scooter body -->
    <path d="M30 85 L50 85 L65 40 L95 40 L105 55 L115 65 L115 85 L105 85" stroke="#DC2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Front wheel -->
    <circle cx="115" cy="85" r="18" fill="none" stroke="#DC2626" stroke-width="4"/>
    <!-- Delivery box -->
    <rect x="40" y="15" width="42" height="35" rx="6" fill="url(#grad)" stroke="#991B1B" stroke-width="2"/>
    <line x1="48" y1="28" x2="74" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="38" x2="66" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Lid/flap -->
    <path d="M40 15 L44 6 L82 6 L82 15" fill="#EF4444" stroke="#991B1B" stroke-width="2"/>
    <!-- Star on box -->
    <path d="M61 22 L63 18 L65 22 L69 22 L66 25 L67 29 L63 27 L59 29 L60 25 L57 22 Z" fill="#FBBF24"/>
  </g>

  <!-- FUUDELIVERY text -->
  <g transform="translate(180, 50)">
    <!-- FUUD -->
    <text x="0" y="55" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="900" fill="#DC2626" letter-spacing="1">FUUD</text>
    <!-- Subtitle bar -->
    <rect x="0" y="67" width="85" height="5" rx="2.5" fill="#FBBF24"/>

    <!-- ELIVERY -->
    <text x="85" y="55" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#1F2937" letter-spacing="1">ELIVERY</text>

    <!-- Tagline -->
    <text x="0" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#6B7280" letter-spacing="6">SABOR · RAPIDEZ · CONFIANÇA</text>
  </g>
</svg>
