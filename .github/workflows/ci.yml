name: CI Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  monolith:
    name: Monolith (cmd/fuudelivery)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/fuudelivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  payment-service:
    name: Payment Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Payment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  auth-api:
    name: Auth API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/auth_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  payment-api:
    name: Payment API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/payment_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  orders-api:
    name: Orders API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/orders_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  lint:
    name: Lint (monolith)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/fuudelivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Check formatting
        run: |
          gofmt -l -s . | tee /dev/stderr
          if [ -n "$(gofmt -l -s .)" ]; then exit 1; fi

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/fuudelivery
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - Frontend/WebRestaurant
          - Frontend/WebAdmin
          - Frontend/PaymentPanel
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
